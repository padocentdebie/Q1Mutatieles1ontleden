<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Interactief Digibord - Zinsontleding</title>
    <style>
        :root { --primary: #2c3e50; --accent: #e74c3c; --bg: #ecf0f1; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 20px; }
        .screen { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); max-width: 1400px; margin: 0 auto; }
        
        /* Stap 1 */
        .whiteboard-container { position: relative; background: #fff; border: 5px solid #333; border-radius: 10px; margin-top: 20px; }
        #displaySentence { position: absolute; top: 20px; left: 20px; font-size: 3.5rem; pointer-events: none; z-index: 1; font-weight: bold; }
        canvas { display: block; width: 100%; height: 500px; touch-action: none; position: relative; z-index: 2; }
        #sentenceInput { width: 100%; font-size: 2rem; padding: 10px; margin-bottom: 10px; border: 2px solid var(--primary); }

        /* Stap 2 */
        .grid-container { display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px; }
        .column { background: #f8f9fa; border: 2px solid #ddd; padding: 15px; border-radius: 10px; }
        .column h3 { background: var(--primary); color: white; margin: -15px -15px 15px -15px; padding: 10px; font-size: 1rem; text-align: center; }
        .column input { width: 90%; font-size: 1.1rem; padding: 5px; margin-bottom: 5px; }

        /* Stap 3 */
        #dragContainer { min-height: 100px; padding: 20px; background: #eee; border-radius: 10px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px; }
        .draggable { padding: 10px 20px; font-size: 1.3rem; background: var(--accent); color: white; cursor: grab; border-radius: 8px; user-select: none; }
        .drop-zone { min-height: 150px; border: 5px dashed var(--primary); border-radius: 15px; padding: 20px; background: #fff; display: flex; flex-wrap: wrap; gap: 10px; align-items: center; font-size: 2.5rem; }
        .dropped-word { background: #dcdde1; padding: 5px 15px; border-radius: 5px; border: 1px solid #7f8c8d; }

        .btn-next { background: #27ae60; color: white; padding: 15px 30px; border: none; border-radius: 8px; cursor: pointer; float: right; margin-top: 20px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="screen1" class="screen">
        <h2>1. De Zin & Het Whiteboard</h2>
        <input type="text" id="sentenceInput" placeholder="Typ hier de zin die ontleed moet worden...">
        <div class="whiteboard-container">
            <div id="displaySentence"></div>
            <canvas id="drawingCanvas"></canvas>
        </div>
        <button onclick="clearDrawing()" style="margin-top:10px;">Wis tekening</button>
        <button class="btn-next" onclick="showScreen(2)">Naar de Kolommen →</button>
    </div>

    <div id="screen2" class="screen" style="display:none;">
        <h2>2. Vul de kolommen (Realtime)</h2>
        <div class="grid-container" id="analysisGrid"></div>
        <button class="btn-next" onclick="showScreen(3)">Maak de zinnen →</button>
    </div>

    <div id="screen3" class="screen" style="display:none;">
        <h2>3. Hilarische Zinnen Bouwen</h2>
        <p>Sleep woorden naar het vak. De woorden bovenin blijven staan!</p>
        <div id="dragContainer"></div>
        <div class="drop-zone" id="sentenceBuilder" ondrop="drop(event)" ondragover="allowDrop(event)"></div>
        <button class="btn-next" onclick="clearSentence()">Zin wissen</button>
        <button class="btn-next" style="margin-right:10px;" onclick="showScreen(1)">Terug naar start</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getDatabase, ref, set, onValue, push, remove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC-Of0AUOd-kVo2RKxYc-68Gr-RO4HdRk0",
        authDomain: "q2aangifteles2.firebaseapp.com",
        databaseURL: "https://q2aangifteles2-default-rtdb.europe-west1.firebasedatabase.app",
        projectId: "q2aangifteles2",
        storageBucket: "q2aangifteles2.firebasestorage.app",
        messagingSenderId: "696806554615",
        appId: "1:696806554615:web:bd877b1caee23c5283ccf2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // --- SCREEN 1 LOGICA ---
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    const displaySentence = document.getElementById('displaySentence');
    const sentenceInput = document.getElementById('sentenceInput');
    
    canvas.width = 1340; // Hardcoded voor stabiliteit op digibord
    canvas.height = 500;

    sentenceInput.oninput = () => set(ref(db, 'shared/sentence'), sentenceInput.value);
    onValue(ref(db, 'shared/sentence'), (s) => {
        const val = s.val() || "";
        sentenceInput.value = val;
        displaySentence.innerText = val;
    });

    let drawing = false;
    canvas.onmousedown = () => drawing = true;
    window.onmouseup = () => { drawing = false; ctx.beginPath(); };
    canvas.onmousemove = (e) => {
        if (!drawing) return;
        const rect = canvas.getBoundingClientRect();
        push(ref(db, 'shared/drawing'), { x: e.clientX - rect.left, y: e.clientY - rect.top });
    };

    onValue(ref(db, 'shared/drawing'), (snapshot) => {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.lineWidth = 5;
        ctx.strokeStyle = "red";
        snapshot.forEach((child) => {
            const pt = child.val();
            ctx.lineTo(pt.x, pt.y);
            ctx.stroke();
            ctx.beginPath();
            ctx.moveTo(pt.x, pt.y);
        });
    });

    window.clearDrawing = () => remove(ref(db, 'shared/drawing'));

    // --- SCREEN 2 LOGICA ---
    const cols = ["Onderwerp", "Persoonsvorm", "Lijdend Voorwerp", "Meewerkend Voorwerp", "Gezegde"];
    const grid = document.getElementById('analysisGrid');
    cols.forEach((name, ci) => {
        const d = document.createElement('div');
        d.className = 'column';
        d.innerHTML = `<h3>${name}</h3>`;
        for(let i=0; i<10; i++) {
            const inp = document.createElement('input');
            inp.dataset.path = `c${ci}r${i}`;
            inp.oninput = (e) => set(ref(db, 'shared/table/'+e.target.dataset.path), e.target.value);
            d.appendChild(inp);
        }
        grid.appendChild(d);
    });

    onValue(ref(db, 'shared/table'), (s) => {
        const data = s.val() || {};
        document.querySelectorAll('#analysisGrid input').forEach(inp => {
            inp.value = data[inp.dataset.path] || "";
        });
    });

    // --- SCREEN 3 LOGICA ---
    window.showScreen = (n) => {
        document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
        document.getElementById('screen'+n).style.display = 'block';
        if(n === 3) loadWords();
    };

    function loadWords() {
        const container = document.getElementById('dragContainer');
        container.innerHTML = "";
        onValue(ref(db, 'shared/table'), (s) => {
            const data = s.val();
            if(!data) return;
            container.innerHTML = ""; // Refresh list
            Object.values(data).forEach(word => {
                if(word.trim()){
                    const div = document.createElement('div');
                    div.className = 'draggable';
                    div.draggable = true;
                    div.innerText = word;
                    div.ondragstart = (e) => e.dataTransfer.setData("text", e.target.innerText);
                    container.appendChild(div);
                }
            });
        }, { onlyOnce: true });
    }

    window.allowDrop = (e) => e.preventDefault();
    window.drop = (e) => {
        e.preventDefault();
        const word = e.dataTransfer.getData("text");
        const div = document.createElement('div');
        div.className = 'dropped-word';
        div.innerText = word;
        document.getElementById('sentenceBuilder').appendChild(div);
    };

    window.clearSentence = () => document.getElementById('sentenceBuilder').innerHTML = "";

</script>
</body>
</html>
